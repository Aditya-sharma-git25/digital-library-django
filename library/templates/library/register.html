{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - e-Library Hub AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            color: white;
        }

        .auth-box {
            width: 100%;
            max-width: 450px;
            background: white;
            color: #222;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 55px rgba(0,0,0,0.35);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #243b55;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 15px;
            color: #222;
            background: white;
        }

        input::placeholder {
            color: #777;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #243b55;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #17283d;
        }

        .message {
            background: #ffe9e9;
            color: #b00020;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .link {
            text-align: center;
            margin-top: 18px;
            color: #333;
        }

        .link a {
            color: #243b55;
            font-weight: 600;
            text-decoration: none;
        }

        @media (max-width: 500px) {
            .auth-box {
                padding: 30px 22px;
            }
        }
    </style>
</head>

<body>

<div class="auth-box">
    <h2>Create Account</h2>
    <p class="subtitle">Join the digital library portal</p>

    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Choose username" required>
        <input type="email" name="email" placeholder="Enter email" required>
        <input type="password" name="password" placeholder="Create password" required>
        <button type="submit">Register</button>
    </form>

    <div class="link">
        Already have an account? <a href="{% url 'login' %}">Login</a>
    </div>
</div>

</body>
</html>
