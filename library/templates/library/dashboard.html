 {% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;
    margin:0;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

.navbar-brand{
    color:#4f9cff !important;
    font-weight:600;
}

/* BACKGROUND PARTICLES */
.particle{
    position:fixed;
    width:5px;
    height:5px;
    background:#38bdf8;
    border-radius:50%;
    opacity:0.6;
    animation: float 10s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    100%{transform:translateY(-100vh);}
}

/* HEADER */
.header{
    margin-top:120px;
    padding:40px;
}

.header h1{
    font-weight:700;
}

/* CARDS */
.card-box{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.1);
}

.card-box:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* NUMBERS */
.stat-number{
    font-size:40px;
    font-weight:700;
    margin-top:10px;
}

/* STATUS */
.status{
    color:#22c55e;
    font-weight:600;
}

/* USER BADGE */
.user-badge{
    position:absolute;
    right:40px;
    top:120px;
    background:#111;
    padding:8px 15px;
    border-radius:20px;
    font-size:14px;
}

/* BUTTONS */
.quick-btn{
    margin-top:20px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">📚 e-Library Hub AI</a>

    <div class="ms-auto">
        <a class="nav-link d-inline me-3 text-white" href="{% url 'home' %}">Home</a>
        <a class="nav-link d-inline me-3 text-white" href="{% url 'book_list' %}">Browse Books</a>
        <a class="nav-link d-inline me-3 text-white" href="{% url 'bookmarks' %}">Bookmarks</a>
    </div>
</div>
</nav>

<!-- USER -->
<div class="user-badge">
    Logged in as {{ request.user.username }}
</div>

<!-- HEADER -->
<div class="container header">
    <h1>📊 My Dashboard</h1>
    <p>Track your reading activity & bookmarks</p>
</div>

<!-- STATS -->
<div class="container">
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card-box">
                <h5>Total Books</h5>
                <div class="stat-number" id="totalBooks">0</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <h5>Saved Books</h5>
                <div class="stat-number" id="savedBooks">0</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <h5>Status</h5>
                <div class="status">Active</div>
            </div>
        </div>

    </div>

    <!-- QUICK ACTIONS -->
    <div class="text-center quick-btn">
        <a href="{% url 'book_list' %}" class="btn btn-primary me-2">Browse Books</a>
        <a href="{% url 'bookmarks' %}" class="btn btn-outline-light">View Bookmarks</a>
    </div>

</div>

<!-- PARTICLES SCRIPT -->
<script>
for(let i=0;i<40;i++){
    let p = document.createElement("div");
    p.className="particle";
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (5 + Math.random()*10) + "s";
    document.body.appendChild(p);
}
</script>

<!-- COUNT ANIMATION -->
<script>
function animateValue(id, start, end, duration) {
    let obj = document.getElementById(id);
    let range = end - start;
    let startTime = null;

    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        let progress = timestamp - startTime;
        let value = Math.min(Math.floor(progress / duration * range + start), end);
        obj.innerHTML = value;
        if (value < end) {
            requestAnimationFrame(step);
        }
    }
    requestAnimationFrame(step);
}

/* 🔥 Replace with real values from Django */
animateValue("totalBooks", 0, {{ total_books|default:0 }}, 1000);
animateValue("savedBooks", 0, {{ saved_books|default:0 }}, 1000);
</script>

</body>
</html>
