{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>e-Library Hub AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
padding:0;
overflow-x:hidden;
}

/* NAVBAR */
.navbar{
background:rgba(0,0,0,0.5);
backdrop-filter:blur(8px);
}

.navbar-brand, .nav-link{
color:white !important;
}

/* HERO SECTION */
.hero{
height:100vh;
background: url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f") no-repeat center center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

/* DARK OVERLAY */
.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

/* TEXT */
.hero-content{
position:relative;
color:white;
z-index:2;
}

.hero h1{
font-size:60px;
font-weight:700;
}

.hero p{
font-size:20px;
opacity:0.8;
}

/* FLOATING LEAVES */
.leaf{
position:fixed;
top:-50px;
font-size:18px;
pointer-events:none;
z-index:1;
opacity:0.8;
}

/* Animations */
@keyframes fall1{
0%{ transform:translateY(-50px) translateX(0) rotate(0deg); }
100%{ transform:translateY(110vh) translateX(50px) rotate(360deg); }
}

@keyframes fall2{
0%{ transform:translateY(-50px) translateX(0) rotate(0deg); }
100%{ transform:translateY(110vh) translateX(-80px) rotate(-360deg); }
}

@keyframes fall3{
0%{ transform:translateY(-50px) translateX(0) rotate(0deg); }
100%{ transform:translateY(110vh) translateX(30px) rotate(180deg); }
}

@keyframes fall4{
0%{ transform:translateY(-50px) translateX(0) scale(1); }
100%{ transform:translateY(110vh) translateX(-40px) scale(0.7); }
}

/* AI CHAT BUTTON */
.ai-chat{
position:fixed;
bottom:30px;
right:30px;
background:white;
border-radius:50px;
padding:10px 18px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
z-index:999;
}

.ai-icon{
width:30px;
height:30px;
border-radius:50%;
background:#4c8cff;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* CHATBOX */
.chatbox{
position:fixed;
bottom:90px;
right:30px;
width:300px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:none;
z-index:999;
}

.messages{
height:200px;
overflow-y:auto;
padding:10px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">

<a class="navbar-brand" href="{% url 'home' %}">
📚 e-Library Hub AI
</a>

<div class="ms-auto">

<a class="nav-link d-inline me-3" href="{% url 'home' %}">Home</a>
<a class="nav-link d-inline me-3" href="{% url 'book_list' %}">Browse Books</a>

{% if user.is_authenticated %}
<a class="nav-link d-inline me-3" href="#">Bookmarks</a>
<a class="nav-link d-inline me-3" href="{% url 'logout' %}">Logout</a>
{% else %}
<a class="nav-link d-inline me-3" href="{% url 'login' %}">Login</a>
<a class="nav-link d-inline me-3" href="{% url 'register' %}">Sign Up</a>
{% endif %}

</div>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>📚 Discover Knowledge Without Limits</h1>
<p>Explore books, research & AI-powered recommendations</p>
</div>
</section>

<!-- FLOATING LEAVES SCRIPT -->
<script>
const animations = ["fall1","fall2","fall3","fall4"];

for(let i=0;i<25;i++){
let leaf = document.createElement("div");
leaf.className = "leaf";
leaf.innerHTML = "🍂";
leaf.style.left = Math.random()*100 + "vw";
leaf.style.fontSize = (12 + Math.random()*12) + "px";

let anim = animations[Math.floor(Math.random()*animations.length)];
leaf.style.animation = `${anim} ${5 + Math.random()*7}s linear infinite`;

document.body.appendChild(leaf);
}
</script>

<!-- AI CHAT BUTTON -->
<div class="ai-chat" onclick="toggleChat()">
  <div class="ai-icon">AI</div>
  <span>Ask AI</span>
</div>

<!-- CHAT BOX -->
<div class="chatbox" id="chatbox">

  <div style="background:#4c8cff;color:white;padding:10px;">
    AI Book Assistant
  </div>

  <div class="messages" id="messages"></div>

  <div style="display:flex;border-top:1px solid #ddd">

    <input id="userInput" type="text" placeholder="Enter genre..."
    style="flex:1;border:none;padding:10px">

    <button onclick="sendMessage()" 
    style="border:none;background:#4c8cff;color:white;padding:10px;">
      Send
    </button>

  </div>

</div>

<!-- CHAT SCRIPT -->
<script>

function toggleChat(){
let box = document.getElementById("chatbox")
box.style.display = box.style.display==="block" ? "none" : "block"
}

function sendMessage(){

let input = document.getElementById("userInput")
let message = input.value

if(!message) return

let messages = document.getElementById("messages")

messages.innerHTML += "<p><b>You:</b> "+message+"</p>"

fetch("/ai-chat/",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})
.then(res=>res.json())
.then(data=>{

messages.innerHTML += "<p><b>AI:</b> "+data.reply+"</p>"

if(data.books){
data.books.forEach(book=>{
messages.innerHTML += "<p>📚 "+book.title+" - "+book.author+"</p>"
})
}

messages.scrollTop = messages.scrollHeight

})

input.value=""

}

</script>

</body>
</html>
